aid: federal-bureau-of-investigation
name: Federal Bureau of Investigation
type: Index
description: The Federal Bureau of Investigation (FBI) is the domestic intelligence and security service of the United States
  and its principal federal law enforcement agency. The FBI publishes public APIs covering its Most Wanted program and Uniform
  Crime Reporting (UCR) data through the Crime Data Explorer.
