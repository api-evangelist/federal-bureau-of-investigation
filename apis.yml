apis:
- aid: federal-bureau-of-investigation:most-wanted-api
  name: FBI Most Wanted
  description: The FBI Most Wanted API is designed to help developers easily get information on the FBI Wanted program, including
    Ten Most Wanted Fugitives, Most Wanted Terrorists, kidnappings and missing persons, and seeking information cases. The
    API supports filtering by field office and pagination of results.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://www.fbi.gov/wanted/api
  baseURL: https://api.fbi.gov
  tags:
  - Criminals
  - Law Enforcement
  - Most Wanted
  properties:
  - type: Documentation
    url: https://www.fbi.gov/wanted/api
  - type: OpenAPI
    url: openapi/most-wanted-api-openapi.yml
  - type: NaftikoCapability
    url: capabilities/most-wanted-list.yaml
- aid: federal-bureau-of-investigation:crime-data-explorer
  name: FBI Crime Data Explorer
  description: The FBI Crime Data Explorer (CDE) provides public access to Uniform Crime Reporting (UCR) data through a JSON
    API. The API exposes summary statistics, agency-level participation, offense and arrest counts, and hate crime, victimization,
    and law enforcement officer data drawn from the National Incident-Based Reporting System (NIBRS) and Summary Reporting
    System.
  image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://crime-data-explorer.fbi.gov/
  baseURL: https://api.usa.gov/crime/fbi/cde
  tags:
  - Crime Data
  - Law Enforcement
  - Statistics
  - Uniform Crime Reporting
  properties:
  - type: Documentation
    url: https://crime-data-explorer.fbi.gov/pages/docApi
  - type: Portal
    url: https://crime-data-explorer.fbi.gov/
